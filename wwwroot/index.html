<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>SmartOffice Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
</head>
<body>
    <header>
        SmartOffice Dashboard
        <span class="status" id="connStatus"></span>
        <div class="nav-links">
            <button class="active" id="btnViewNormal" onclick="switchView('normal')">Normal</button>
            <button id="btnViewAdmin" onclick="switchView('admin')">Admin</button>
            <a href="/swagger">Swagger</a>
        </div>
    </header>

    <!-- NORMAL VIEW -->
    <div id="viewNormal" class="view active">
        <div class="normal-layout">
            <div class="folder-panel">
                <div class="card">
                    <div class="card-header">
                        <span>Folders</span>
                        <button class="primary" id="btnFetchFolders" style="font-size:11px;padding:4px 8px;">&#8635;</button>
                    </div>
                    <div class="card-body">
                        <div id="folderTree" class="folder-tree"><span class="hint">Loading folders...</span></div>
                    </div>
                </div>
            </div>
            <div class="mail-panel">
                <div class="card" style="min-height:300px;">
                    <div class="card-header">
                        <span>Mails <span id="mailCount"></span></span>
                        <div class="controls">
                            <select id="selRange">
                                <option value="1d">Today</option>
                                <option value="1w">Last 7 days</option>
                                <option value="1m">Last 30 days</option>
                            </select>
                            <select id="selCount">
                                <option value="10">10</option>
                                <option value="20">20</option>
                                <option value="30">30</option>
                                <option value="100">100</option>
                            </select>
                            <button class="primary" id="btnFetchMails">Fetch Mails</button>
                        </div>
                    </div>
                    <div class="card-body">
                        <div id="mailList"><span class="hint">Click "Fetch Mails" to load emails from the selected folder.</span></div>
                    </div>
                </div>
            </div>
            <div class="chat-panel">
                <div class="card">
                    <div class="card-header">Chat</div>
                    <div class="card-body">
                        <div id="chatMessages"></div>
                        <div style="display:flex;gap:8px;">
                            <input id="chatInput" type="text" placeholder="Send message..." style="flex:1;padding:7px;border:1px solid #ccc;border-radius:4px;font-size:13px;" />
                            <button class="primary" id="btnSendChat">Send</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ADMIN VIEW -->
    <div id="viewAdmin" class="view">
        <div class="admin-container">
            <div class="card">
                <div class="card-header">Outlook Add-in Status</div>
                <div class="card-body">
                    <div class="status-grid">
                        <div class="status-item">
                            <div class="label">Connection</div>
                            <div class="value offline" id="addinConnValue">Unknown</div>
                        </div>
                        <div class="status-item">
                            <div class="label">Last Poll</div>
                            <div class="value" id="addinLastPoll">-</div>
                        </div>
                        <div class="status-item">
                            <div class="label">Last Push</div>
                            <div class="value" id="addinLastPush">-</div>
                        </div>
                        <div class="status-item">
                            <div class="label">Last Command</div>
                            <div class="value" id="addinLastCmd">-</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-header">
                    <span>Add-in Logs</span>
                    <button class="primary" onclick="refreshAdminLogs()" style="font-size:11px;padding:4px 10px;">Refresh</button>
                </div>
                <div class="card-body" style="padding:0;">
                    <div id="adminLogs"><span style="color:#6a9955;">Waiting for logs...</span></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <script src="/folder-tree.js"></script>
    <script>
        var API = '';
        var _mailsReceived = false;
        var _foldersReceived = false;
        var connection = new signalR.HubConnectionBuilder().withUrl(API + '/hub/notifications').withAutomaticReconnect().build();

        function switchView(view) {
            document.getElementById('viewNormal').classList.toggle('active', view === 'normal');
            document.getElementById('viewAdmin').classList.toggle('active', view === 'admin');
            document.getElementById('btnViewNormal').classList.toggle('active', view === 'normal');
            document.getElementById('btnViewAdmin').classList.toggle('active', view === 'admin');
            if (view === 'admin') refreshAdminData();
        }

        function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

        function pollUntil(checkFn, timeoutMs) {
            return new Promise(function(resolve) {
                var start = Date.now();
                var interval = setInterval(async function() {
                    try {
                        var done = await checkFn();
                        if (done || (Date.now() - start) >= timeoutMs) { clearInterval(interval); resolve(done); }
                    } catch(e) {
                        if ((Date.now() - start) >= timeoutMs) { clearInterval(interval); resolve(false); }
                    }
                }, 2000);
            });
        }

        function fmtTime(ts) { return ts ? new Date(ts).toLocaleTimeString() : '-'; }

        // ---- Folders ----
        async function loadFolders() {
            var btn = document.getElementById('btnFetchFolders');
            btn.disabled = true;
            _foldersReceived = false;
            try {
                await fetch(API + '/api/outlook/request-folders', { method: 'POST' });
                await pollUntil(async function() {
                    if (_foldersReceived) return true;
                    var res = await fetch(API + '/api/outlook/folders');
                    var folders = await res.json();
                    if (folders && folders.length) {
                        renderFolders(folders);
                        return true;
                    }
                    return false;
                }, 30000);
            } catch(e) { console.error('Load folders error:', e); }
            btn.disabled = false;
        }

        function renderFolders(folders) {
            var container = document.getElementById('folderTree');
            FolderTreeManager.renderTree(folders, container);
        }

        document.getElementById('btnFetchFolders').onclick = loadFolders;

        connection.on('FoldersUpdated', function(folders) {
            _foldersReceived = true;
            renderFolders(folders);
            document.getElementById('btnFetchFolders').disabled = false;
        });

        // ---- Mails ----
        function renderMails(mails) {
            var el = document.getElementById('mailList');
            document.getElementById('mailCount').textContent = '(' + mails.length + ')';
            if (!mails.length) { el.innerHTML = '<span class="hint">No mails found.</span>'; return; }
            
            window._mailsData = mails;
            
            el.innerHTML = mails.map(function(m, i) {
                return '<div class="mail-item">'
                    + '<div class="mail-header" onclick="toggleMail('+i+')">'
                    + '<div><span class="arrow" id="arrow'+i+'">&#x25B6;</span>'
                    + '<span class="mail-subject">'+esc(m.subject)+'</span><br/>'
                    + '<span class="mail-sender">'+esc(m.senderName)+' &lt;'+esc(m.senderEmail)+'&gt;</span></div>'
                    + '<span class="mail-time">'+new Date(m.receivedTime).toLocaleString()+'</span>'
                    + '</div>'
                    + '<div class="mail-actions" id="actions'+i+'">'
                    + '<button class="secondary" onclick="toggleFormat('+i+', event)">Switch to HTML</button>'
                    + '</div>'
                    + '<div class="mail-body" id="body'+i+'" data-mode="text">'+esc(m.body)+'</div></div>';
            }).join('');
        }

        window.toggleMail = function(i) {
            document.getElementById('body'+i).classList.toggle('open');
            document.getElementById('arrow'+i).classList.toggle('open');
            document.getElementById('actions'+i).classList.toggle('open');
        };

        window.toggleFormat = function(i, event) {
            event.stopPropagation();
            var bodyEl = document.getElementById('body'+i);
            var btn = event.target;
            var currentMode = bodyEl.getAttribute('data-mode');
            var mail = window._mailsData[i];
            
            if (currentMode === 'text') {
                var iframe = document.createElement('iframe');
                iframe.style.width = '100%';
                iframe.style.minHeight = '400px';
                iframe.style.border = 'none';
                iframe.style.background = '#fff';
                bodyEl.innerHTML = '';
                bodyEl.appendChild(iframe);
                
                var iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                iframeDoc.open();
                iframeDoc.write(mail.bodyHtml || mail.body);
                iframeDoc.close();
                
                iframe.onload = function() {
                    try {
                        var body = iframe.contentDocument.body;
                        var html = iframe.contentDocument.documentElement;
                        var height = Math.max(body.scrollHeight, body.offsetHeight, html.clientHeight, html.scrollHeight, html.offsetHeight);
                        iframe.style.height = height + 'px';
                    } catch(e) {
                        iframe.style.height = '400px';
                    }
                };
                
                bodyEl.classList.add('html-mode');
                bodyEl.setAttribute('data-mode', 'html');
                btn.textContent = 'Switch to Text';
            } else {
                bodyEl.textContent = mail.body;
                bodyEl.classList.remove('html-mode');
                bodyEl.setAttribute('data-mode', 'text');
                btn.textContent = 'Switch to HTML';
            }
        };

        document.getElementById('btnFetchMails').onclick = async function() {
            var btn = this;
            btn.disabled = true;
            btn.textContent = 'Fetching...';
            _mailsReceived = false;
            try {
                var req = {
                    folderPath: FolderTreeManager.selectedPath,
                    range: document.getElementById('selRange').value,
                    maxCount: parseInt(document.getElementById('selCount').value)
                };
                await fetch(API + '/api/outlook/request-mails', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(req)
                });
                await pollUntil(async function() {
                    if (_mailsReceived) return true;
                    var res = await fetch(API + '/api/outlook/mails');
                    var mails = await res.json();
                    if (mails && mails.length) { renderMails(mails); return true; }
                    return false;
                }, 30000);
            } catch(e) { console.error('Fetch mails error:', e); }
            btn.textContent = 'Fetch Mails';
            btn.disabled = false;
        };

        connection.on('MailsUpdated', function(mails) {
            _mailsReceived = true;
            renderMails(mails);
            document.getElementById('btnFetchMails').textContent = 'Fetch Mails';
            document.getElementById('btnFetchMails').disabled = false;
        });

        // ---- Chat ----
        function appendChat(msg) {
            var el = document.getElementById('chatMessages');
            var cls = msg.source === 'web' ? 'web' : '';
            el.innerHTML += '<div class="chat-msg '+cls+'">'
                + '<div class="meta">['+esc(msg.source)+'] '+new Date(msg.timestamp).toLocaleTimeString()+'</div>'
                + '<div class="text">'+esc(msg.text)+'</div></div>';
            el.scrollTop = el.scrollHeight;
        }
        connection.on('NewChatMessage', appendChat);
        document.getElementById('btnSendChat').onclick = sendWebChat;
        document.getElementById('chatInput').onkeydown = function(e) { if (e.key === 'Enter') sendWebChat(); };

        async function sendWebChat() {
            var input = document.getElementById('chatInput');
            var text = input.value.trim();
            if (!text) return;
            input.value = '';
            await fetch(API + '/api/outlook/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text, source: 'web' })
            });
        }

        // ---- Admin ----
        function renderAddinStatus(s) {
            var connEl = document.getElementById('addinConnValue');
            connEl.textContent = s.connected ? 'Online' : 'Offline';
            connEl.className = 'value ' + (s.connected ? 'online' : 'offline');
            document.getElementById('addinLastPoll').textContent = fmtTime(s.lastPollTime);
            document.getElementById('addinLastPush').textContent = fmtTime(s.lastPushTime);
            document.getElementById('addinLastCmd').textContent = s.lastCommand || '-';
        }

        function renderAdminLogs(logs) {
            var el = document.getElementById('adminLogs');
            if (!logs || !logs.length) { el.innerHTML = '<span style="color:#6a9955;">No logs yet.</span>'; return; }
            el.innerHTML = logs.map(function(l) {
                return '<div class="log-entry ' + esc(l.level) + '">'
                    + '<span class="log-time">[' + new Date(l.timestamp).toLocaleTimeString() + ']</span> '
                    + '<span>[' + esc(l.level).toUpperCase() + ']</span> '
                    + esc(l.message) + '</div>';
            }).join('');
            el.scrollTop = el.scrollHeight;
        }

        connection.on('AddinStatus', renderAddinStatus);
        connection.on('AddinLog', renderAdminLogs);

        async function refreshAdminData() {
            try {
                var r = await Promise.all([fetch(API+'/api/outlook/admin/status'), fetch(API+'/api/outlook/admin/logs')]);
                renderAddinStatus(await r[0].json());
                renderAdminLogs(await r[1].json());
            } catch(e) {}
        }

        window.refreshAdminLogs = async function() {
            try { var res = await fetch(API+'/api/outlook/admin/logs'); renderAdminLogs(await res.json()); } catch(e) {}
        };

        // ---- Init ----
        (async function() {
            connection.onreconnecting(function() {
                document.getElementById('connStatus').textContent = '? reconnecting';
                document.getElementById('connStatus').className = 'status err';
            });
            connection.onreconnected(function() {
                document.getElementById('connStatus').textContent = 'ˇ´ connected';
                document.getElementById('connStatus').className = 'status ok';
            });
            try {
                await connection.start();
                document.getElementById('connStatus').textContent = 'ˇ´ connected';
                document.getElementById('connStatus').className = 'status ok';
            } catch(e) {
                document.getElementById('connStatus').textContent = 'ˇ´ disconnected';
                document.getElementById('connStatus').className = 'status err';
            }
            try { var chatRes = await fetch(API+'/api/outlook/chat'); (await chatRes.json()).forEach(appendChat); } catch(e) {}
            loadFolders();
        })();
    </script>
</body>
</html>
